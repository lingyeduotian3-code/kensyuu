<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <div th:replace="~{fragment :: meta}"></div>
    <div th:replace="~{fragment :: styles}"></div>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

    <title>民宿詳細</title>
</head>

<body>
    <div class="moattravel-wrapper">

        <div th:replace="~{fragment :: header}"></div>

        <main>
            <div class="container pt-4 pb-5 moattravel-container">
                <div class="row justify-content-center">
                    <div class="col-xxl-9 col-xl-10 col-lg-11">

                        <nav class="mb-4"
                             style="--bs-breadcrumb-divider: '>';"
                             aria-label="breadcrumb">

                            <ol class="breadcrumb mb-0">
                                <li class="breadcrumb-item">
                                    <a th:href="@{/}">ホーム</a>
                                </li>

                                <li class="breadcrumb-item">
                                    <a th:href="@{/houses}">民宿一覧</a>
                                </li>

                                <li class="breadcrumb-item active"
                                    aria-current="page">
                                    民宿詳細
                                </li>
                            </ol>
                        </nav>

                        <h1 class="mb-4 text-center"
                            th:text="${house.getName()}">
                        </h1>

                        <div th:if="${successMessage}"
                             class="alert alert-success">

                            <span th:text="${successMessage}"></span>
                        </div>

                        <div th:if="${errorMessage}"
                             class="alert alert-danger">

                            <span th:text="${errorMessage}"></span>
                        </div>

                        <div class="mb-4">
                            <img th:if="${house.getImageName()}"
                                 th:src="@{/storage/__${house.getImageName()}__}"
                                 class="w-100"
                                 alt="民宿画像">

                            <img th:unless="${house.getImageName()}"
                                 th:src="@{/images/noImage.png}"
                                 class="w-100"
                                 alt="NO IMAGE">
                        </div>

                        <div class="container">
                            <div class="row">

                                <div class="col-lg-8 container mb-4">

                                    <div class="row pb-2 mb-2 border-bottom">
                                        <div class="col-4">
                                            <span class="fw-bold">民宿名</span>
                                        </div>

                                        <div class="col">
                                            <span th:text="${house.getName()}"></span>
                                        </div>
                                    </div>

                                    <div class="row pb-2 mb-2 border-bottom">
                                        <div class="col-4">
                                            <span class="fw-bold">説明</span>
                                        </div>

                                        <div class="col">
                                            <span class="moattravel-pre-wrap"
                                                  th:text="${house.getDescription()}">
                                            </span>
                                        </div>
                                    </div>

                                    <div class="row pb-2 mb-2 border-bottom">
                                        <div class="col-4">
                                            <span class="fw-bold">宿泊料金</span>
                                        </div>

                                        <div class="col">
                                            <span th:text="${#numbers.formatInteger(
                                                house.getPrice(),
                                                1,
                                                'COMMA'
                                            ) + '円'}">
                                            </span>
                                        </div>
                                    </div>

                                    <div class="row pb-2 mb-2 border-bottom">
                                        <div class="col-4">
                                            <span class="fw-bold">定員</span>
                                        </div>

                                        <div class="col">
                                            <span th:text="${house.getCapacity() + '人'}"></span>
                                        </div>
                                    </div>

                                    <div class="row pb-2 mb-2 border-bottom">
                                        <div class="col-4">
                                            <span class="fw-bold">郵便番号</span>
                                        </div>

                                        <div class="col">
                                            <span th:text="${house.getPostalCode()}"></span>
                                        </div>
                                    </div>

                                    <div class="row pb-2 mb-2 border-bottom">
                                        <div class="col-4">
                                            <span class="fw-bold">住所</span>
                                        </div>

                                        <div class="col">
                                            <span th:text="${house.getAddress()}"></span>
                                        </div>
                                    </div>

                                    <div class="row pb-2 mb-2 border-bottom">
                                        <div class="col-4">
                                            <span class="fw-bold">電話番号</span>
                                        </div>

                                        <div class="col">
                                            <span th:text="${house.getPhoneNumber()}"></span>
                                        </div>
                                    </div>
                                </div>

                                <div sec:authorize="isAnonymous()"
                                     class="col-lg-4 px-0 ps-lg-4 mb-4">

                                    <div class="card">
                                        <div class="card-body">

                                            <p class="card-text">
                                                予約するには
                                                <a th:href="@{/login}">ログイン</a>
                                                が必要です。
                                            </p>

                                            <button type="button"
                                                    class="btn text-white shadow-sm w-100 moattravel-btn"
                                                    disabled>
                                                予約する
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                <div sec:authorize="isAuthenticated()"
                                     class="col-lg-4 px-0 ps-lg-4 mb-4">

                                    <div class="card">
                                        <div class="card-body">

                                            <form method="get"
                                                  th:action="@{/houses/__${house.getId()}__/reservations/input}"
                                                  th:object="${reservationInputForm}">

                                                <div class="form-group mb-2">
                                                    <label for="fromCheckinDateToCheckoutDate"
                                                           class="col-form-label text-md-left fw-bold">
                                                        チェックイン・チェックアウト
                                                    </label>

                                                    <div th:if="${#fields.hasErrors('fromCheckinDateToCheckoutDate')}"
                                                         class="text-danger small mb-2"
                                                         th:errors="*{fromCheckinDateToCheckoutDate}">
                                                    </div>

                                                    <input type="text"
                                                           id="fromCheckinDateToCheckoutDate"
                                                           class="form-control"
                                                           th:field="*{fromCheckinDateToCheckoutDate}">
                                                </div>

                                                <div class="form-group mb-4">
                                                    <label for="numberOfPeople"
                                                           class="col-form-label text-md-left fw-bold">
                                                        宿泊人数
                                                    </label>

                                                    <div th:if="${#fields.hasErrors('numberOfPeople')}"
                                                         class="text-danger small mb-2"
                                                         th:errors="*{numberOfPeople}">
                                                    </div>

                                                    <input type="number"
                                                           id="numberOfPeople"
                                                           class="form-control"
                                                           th:field="*{numberOfPeople}"
                                                           min="1">
                                                </div>

                                                <div class="form-group">
                                                    <button type="submit"
                                                            class="btn text-white shadow-sm w-100 moattravel-btn">
                                                        予約する
                                                    </button>
                                                </div>
                                            </form>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <section class="mt-5">

                            <h2 class="mb-3">評価・口コミ</h2>

                            <div class="card mb-4">
                                <div class="card-body">

                                    <div th:if="${reviewCount > 0}">

                                        <div class="d-flex align-items-center flex-wrap">
                                            <div>
                                                <span class="moattravel-stars"
                                                      th:each="i : ${#numbers.sequence(1, 5)}"
                                                      th:text="${i <= roundedAverageScore ? '★' : '☆'}">
                                                </span>
                                            </div>

                                            <span class="fw-bold ms-2"
                                                  th:text="${#numbers.formatDecimal(
                                                      averageScore,
                                                      1,
                                                      1
                                                  )}">
                                            </span>

                                            <span class="ms-1"
                                                  th:text="${'（'
                                                      + reviewCount
                                                      + '件）'}">
                                            </span>
                                        </div>
                                    </div>

                                    <div th:if="${reviewCount == 0}">
                                        <span class="text-muted">
                                            まだ評価・口コミはありません。
                                        </span>
                                    </div>
                                </div>
                            </div>

                            <div sec:authorize="isAnonymous()"
                                 class="alert alert-secondary mb-4">

                                口コミを投稿するには
                                <a th:href="@{/login}">ログイン</a>
                                が必要です。
                            </div>

                            <div sec:authorize="isAuthenticated()"
                                 class="card mb-4">

                                <div class="card-body">

                                    <h3 class="h5 mb-3">
                                        口コミを投稿する
                                    </h3>

                                    <form method="post"
                                          th:action="@{/houses/{id}/reviews/create(id=${house.id})}"
                                          th:object="${reviewForm}">

                                        <div class="mb-3">
                                            <label for="score"
                                                   class="form-label fw-bold">
                                                評価
                                            </label>

                                            <div th:if="${#fields.hasErrors('score')}"
                                                 class="text-danger small mb-2"
                                                 th:errors="*{score}">
                                            </div>

                                            <select id="score"
                                                    class="form-select"
                                                    th:field="*{score}">

                                                <option value="">
                                                    評価を選択してください
                                                </option>

                                                <option value="5">
                                                    ★★★★★（5）
                                                </option>

                                                <option value="4">
                                                    ★★★★☆（4）
                                                </option>

                                                <option value="3">
                                                    ★★★☆☆（3）
                                                </option>

                                                <option value="2">
                                                    ★★☆☆☆（2）
                                                </option>

                                                <option value="1">
                                                    ★☆☆☆☆（1）
                                                </option>
                                            </select>
                                        </div>

                                        <div class="mb-3">
                                            <label for="comment"
                                                   class="form-label fw-bold">
                                                コメント
                                            </label>

                                            <div th:if="${#fields.hasErrors('comment')}"
                                                 class="text-danger small mb-2"
                                                 th:errors="*{comment}">
                                            </div>

                                            <textarea id="comment"
                                                      class="form-control"
                                                      th:field="*{comment}"
                                                      rows="5"
                                                      maxlength="1000"
                                                      placeholder="この民宿についての感想を入力してください。"></textarea>
                                        </div>

                                        <button type="submit"
                                                class="btn text-white shadow-sm moattravel-btn">
                                            口コミを投稿する
                                        </button>
                                    </form>
                                </div>
                            </div>

                            <div th:if="${reviewCount > 0}">

                                <h3 class="h5 mb-3">投稿された口コミ</h3>

                                <div th:each="review : ${reviewPage.content}"
                                     class="card mb-3">

                                    <div class="card-body">

                                        <div class="mb-2">
                                            <span class="moattravel-stars"
                                                  th:each="i : ${#numbers.sequence(1, 5)}"
                                                  th:text="${i <= review.score ? '★' : '☆'}">
                                            </span>
                                        </div>

                                        <p class="mb-0 moattravel-pre-wrap"
                                           th:text="${review.comment}">
                                        </p>
                                    </div>
                                </div>

                                <nav th:if="${reviewPage.totalPages > 1}"
                                     aria-label="口コミ一覧ページ">

                                    <ul class="pagination justify-content-center">

                                        <li class="page-item">
                                            <span th:if="${reviewPage.first}"
                                                  class="page-link disabled">
                                                前
                                            </span>

                                            <a th:unless="${reviewPage.first}"
                                               th:href="@{/houses/{id}(
                                                   id=${house.id},
                                                   page=${reviewPage.number - 1}
                                               )}"
                                               class="page-link moattravel-page-link">
                                                前
                                            </a>
                                        </li>

                                        <li th:each="i : ${#numbers.sequence(
                                                0,
                                                reviewPage.totalPages - 1
                                            )}"
                                            class="page-item">

                                            <span th:if="${i == reviewPage.number}"
                                                  class="page-link active moattravel-active"
                                                  th:text="${i + 1}">
                                            </span>

                                            <a th:unless="${i == reviewPage.number}"
                                               th:href="@{/houses/{id}(
                                                   id=${house.id},
                                                   page=${i}
                                               )}"
                                               class="page-link moattravel-page-link"
                                               th:text="${i + 1}">
                                            </a>
                                        </li>

                                        <li class="page-item">
                                            <span th:if="${reviewPage.last}"
                                                  class="page-link disabled">
                                                次
                                            </span>

                                            <a th:unless="${reviewPage.last}"
                                               th:href="@{/houses/{id}(
                                                   id=${house.id},
                                                   page=${reviewPage.number + 1}
                                               )}"
                                               class="page-link moattravel-page-link">
                                                次
                                            </a>
                                        </li>
                                    </ul>
                                </nav>
                            </div>
                        </section>
                    </div>
                </div>
            </div>
        </main>

        <div th:replace="~{fragment :: footer}"></div>
    </div>

    <div th:replace="~{fragment :: scripts}"></div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ja.js"></script>
    <script th:src="@{/js/flatpickr.js}"></script>
</body>

</html>
