<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
	<div th:replace="~{fragment :: meta}"></div>
	<div th:replace="~{fragment :: styles}"></div>
	<title>ж°‘е®ҝдёҖиҰ§</title>
</head>

<body>
	<div class="moattravel-wrapper">
		<div th:replace="~{fragment :: header}"></div>
		<main>
			<div class="container moattravel-container pb-5">
				<div class="row justify-content-center">
					<nav class="my-3" style="--bs-breadcrumb-divider: '>';" aria-label="breadcrumb">
						<ol class="breadcrumb mb-0">
							<li class="breadcrumb-item"><a th:href="@{/}">гғӣгғјгғ </a></li>
							<li class="breadcrumb-item active" aria-current="page">ж°‘е®ҝдёҖиҰ§</li>
						</ol>
					</nav>

					<div class="col-xl-3 col-lg-4 col-md-12">
						<form method="get" th:action="@{/houses}" class="w-100 mb-3">
							<div class="input-group">
								<input type="text" class="form-control" name="keyword" th:value="${keyword}"
									placeholder="ж°‘е®ҝеҗҚгғ»зӣ®зҡ„ең°">
								<button type="submit" class="btn text-white shadow-sm moattravel-btn">жӨңзҙў</button>
							</div>
						</form>

						<div class="card mb-3">
							<div class="card-header">
								гӮЁгғӘгӮўгҒӢгӮүжҺўгҒҷ
							</div>
							<div class="card-body">
								<form method="get" th:action="@{/houses}" class="w-100">
									<div class="form-group mb-3">
										<select class="form-control form-select" name="area">
											<option value="" hidden>йҒёжҠһгҒ—гҒҰгҒҸгҒ гҒ•гҒ„</option>
											<section class="mt-5">
												<h2 class="mb-3">и©•дҫЎгғ»еҸЈгӮігғҹ</h2>

												<div th:if="${successMessage}" class="alert alert-success">
													<span th:text="${successMessage}"></span>
												</div>

												<div th:if="${errorMessage}" class="alert alert-danger">
													<span th:text="${errorMessage}"></span>
												</div>

												<div class="mb-4">
													<div th:if="${reviewCount > 0}">
														<span class="moattravel-stars"
															th:each="i : ${#numbers.sequence(1, 5)}"
															th:text="${i <= roundedAverageScore ? 'вҳ…' : 'вҳҶ'}">
														</span>

														<span class="fw-bold ms-2"
															th:text="${#numbers.formatDecimal(averageScore, 1, 1)}">
														</span>

														<span th:text="${'пјҲ' + reviewCount + 'д»¶пјү'}"></span>
													</div>

													<div th:if="${reviewCount == 0}">
														гҒҫгҒ и©•дҫЎгҒҜгҒӮгӮҠгҒҫгҒӣгӮ“гҖӮ
													</div>
												</div>

												<div sec:authorize="isAuthenticated()" class="card mb-4">
													<div class="card-body">
														<h3 class="h5 mb-3">гғ¬гғ“гғҘгғјгӮ’жҠ•зЁҝгҒҷгӮӢ</h3>

														<form method="post"
															th:action="@{/houses/{id}/reviews/create(id=${house.id})}"
															th:object="${reviewForm}">

															<div class="mb-3">
																<label for="score" class="form-label fw-bold">
																	и©•дҫЎ
																</label>

																<div th:if="${#fields.hasErrors('score')}"
																	class="text-danger small mb-2" th:errors="*{score}">
																</div>

																<select id="score" class="form-select"
																	th:field="*{score}">

																	<option value="">
																		и©•дҫЎгӮ’йҒёжҠһгҒ—гҒҰгҒҸгҒ гҒ•гҒ„
																	</option>

																	<option value="5">
																		вҳ…вҳ…вҳ…вҳ…вҳ…пјҲ5пјү
																	</option>

																	<option value="4">
																		вҳ…вҳ…вҳ…вҳ…вҳҶпјҲ4пјү
																	</option>

																	<option value="3">
																		вҳ…вҳ…вҳ…вҳҶвҳҶпјҲ3пјү
																	</option>

																	<option value="2">
																		вҳ…вҳ…вҳҶвҳҶвҳҶпјҲ2пјү
																	</option>

																	<option value="1">
																		вҳ…вҳҶвҳҶвҳҶвҳҶпјҲ1пјү
																	</option>
																</select>
															</div>

															<div class="mb-3">
																<label for="comment" class="form-label fw-bold">
																	гӮігғЎгғігғҲ
																</label>

																<div th:if="${#fields.hasErrors('comment')}"
																	class="text-danger small mb-2"
																	th:errors="*{comment}">
																</div>

																<textarea id="comment" class="form-control"
																	th:field="*{comment}" rows="5" maxlength="1000">
											                    </textarea>
															</div>

															<button type="submit"
																class="btn text-white shadow-sm moattravel-btn">
																гғ¬гғ“гғҘгғјгӮ’жҠ•зЁҝгҒҷгӮӢ
															</button>
														</form>
													</div>
												</div>

												<div th:if="${reviewCount > 0}">
													<div th:each="review : ${reviewPage.content}" class="card mb-3">

														<div class="card-body">
															<div class="mb-2">
																<span class="moattravel-stars"
																	th:each="i : ${#numbers.sequence(1, 5)}"
																	th:text="${i <= review.score ? 'вҳ…' : 'вҳҶ'}">
																</span>
															</div>

															<p class="mb-2" th:text="${review.comment}">
															</p>

															<small class="text-muted" th:text="${#temporals.format(
											                           review.createdAt,
											                           'yyyyе№ҙMMжңҲddж—Ҙ HH:mm'
											                       )}">
															</small>
														</div>
													</div>
												</div>

												<nav th:if="${reviewPage.totalPages > 1}">
													<ul class="pagination justify-content-center">

														<li class="page-item"
															th:classappend="${reviewPage.first ? 'disabled' : ''}">

															<a class="page-link" th:href="@{/houses/{id}(
											                       id=${house.id},
											                       page=${reviewPage.number - 1}
											                   )}">
																еүҚгҒё
															</a>
														</li>

														<li class="page-item disabled">
															<span class="page-link" th:text="${reviewPage.number + 1
											                          + ' / '
											                          + reviewPage.totalPages}">
															</span>
														</li>

														<li class="page-item"
															th:classappend="${reviewPage.last ? 'disabled' : ''}">

															<a class="page-link" th:href="@{/houses/{id}(
											                       id=${house.id},
											                       page=${reviewPage.number + 1}
											                   )}">
																ж¬ЎгҒё
															</a>
														</li>
													</ul>
												</nav>
											</section>
											<optgroup label="еҢ—жө·йҒ“">
												<option value="еҢ—жө·йҒ“" th:selected="${area == 'еҢ—жө·йҒ“'}">еҢ—жө·йҒ“</option>
											</optgroup>

											<optgroup label="жқұеҢ—">
												<option value="йқ’жЈ®зңҢ" th:selected="${area == 'йқ’жЈ®зңҢ'}">йқ’жЈ®зңҢ</option>
												<option value="еІ©жүӢзңҢ" th:selected="${area == 'еІ©жүӢзңҢ'}">еІ©жүӢзңҢ</option>
												<option value="е®®еҹҺзңҢ" th:selected="${area == 'е®®еҹҺзңҢ'}">е®®еҹҺзңҢ</option>
												<option value="з§Ӣз”°зңҢ" th:selected="${area == 'з§Ӣз”°зңҢ'}">з§Ӣз”°зңҢ</option>
												<option value="еұұеҪўзңҢ" th:selected="${area == 'еұұеҪўзңҢ'}">еұұеҪўзңҢ</option>
												<option value="зҰҸеі¶зңҢ" th:selected="${area == 'зҰҸеі¶зңҢ'}">зҰҸеі¶зңҢ</option>
											</optgroup>

											<optgroup label="еҢ—й–ўжқұ">
												<option value="иҢЁеҹҺзңҢ" th:selected="${area == 'иҢЁеҹҺзңҢ'}">иҢЁеҹҺзңҢ</option>
												<option value="ж ғжңЁзңҢ" th:selected="${area == 'ж ғжңЁзңҢ'}">ж ғжңЁзңҢ</option>
												<option value="зҫӨйҰ¬зңҢ" th:selected="${area == 'зҫӨйҰ¬зңҢ'}">зҫӨйҰ¬зңҢ</option>
											</optgroup>

											<optgroup label="йҰ–йғҪеңҸ">
												<option value="еҹјзҺүзңҢ" th:selected="${area == 'еҹјзҺүзңҢ'}">еҹјзҺүзңҢ</option>
												<option value="еҚғи‘үзңҢ" th:selected="${area == 'еҚғи‘үзңҢ'}">еҚғи‘үзңҢ</option>
												<option value="жқұдә¬йғҪ" th:selected="${area == 'жқұдә¬йғҪ'}">жқұдә¬йғҪ</option>
												<option value="зҘһеҘҲе·қзңҢ" th:selected="${area == 'зҘһеҘҲе·қзңҢ'}">зҘһеҘҲе·қзңҢ</option>
											</optgroup>

											<optgroup label="з”ІдҝЎи¶Ҡ">
												<option value="ж–°жҪҹзңҢ" th:selected="${area == 'ж–°жҪҹзңҢ'}">ж–°жҪҹзңҢ</option>
												<option value="еұұжўЁзңҢ" th:selected="${area == 'еұұжўЁзңҢ'}">еұұжўЁзңҢ</option>
												<option value="й•·йҮҺзңҢ" th:selected="${area == 'й•·йҮҺзңҢ'}">й•·йҮҺзңҢ</option>
											</optgroup>

											<optgroup label="еҢ—йҷё">
												<option value="еҜҢеұұзңҢ" th:selected="${area == 'еҜҢеұұзңҢ'}">еҜҢеұұзңҢ</option>
												<option value="зҹіе·қзңҢ" th:selected="${area == 'зҹіе·қзңҢ'}">зҹіе·қзңҢ</option>
												<option value="зҰҸдә•зңҢ" th:selected="${area == 'зҰҸдә•зңҢ'}">зҰҸдә•зңҢ</option>
											</optgroup>

											<optgroup label="жқұжө·">
												<option value="еІҗйҳңзңҢ" th:selected="${area == 'еІҗйҳңзңҢ'}">еІҗйҳңзңҢ</option>
												<option value="йқҷеІЎзңҢ" th:selected="${area == 'йқҷеІЎзңҢ'}">йқҷеІЎзңҢ</option>
												<option value="ж„ӣзҹҘзңҢ" th:selected="${area == 'ж„ӣзҹҘзңҢ'}">ж„ӣзҹҘзңҢ</option>
												<option value="дёүйҮҚзңҢ" th:selected="${area == 'дёүйҮҚзңҢ'}">дёүйҮҚзңҢ</option>
											</optgroup>

											<optgroup label="иҝ‘з•ҝ">
												<option value="ж»ӢиіҖзңҢ" th:selected="${area == 'ж»ӢиіҖзңҢ'}">ж»ӢиіҖзңҢ</option>
												<option value="дә¬йғҪеәң" th:selected="${area == 'дә¬йғҪеәң'}">дә¬йғҪеәң</option>
												<option value="еӨ§йҳӘеәң" th:selected="${area == 'еӨ§йҳӘеәң'}">еӨ§йҳӘеәң</option>
												<option value="е…өеә«зңҢ" th:selected="${area == 'е…өеә«зңҢ'}">е…өеә«зңҢ</option>
												<option value="еҘҲиүҜзңҢ" th:selected="${area == 'еҘҲиүҜзңҢ'}">еҘҲиүҜзңҢ</option>
												<option value="е’ҢжӯҢеұұзңҢ" th:selected="${area == 'е’ҢжӯҢеұұзңҢ'}">е’ҢжӯҢеұұзңҢ</option>
											</optgroup>

											<optgroup label="еұұйҷҪгғ»еұұйҷ°">
												<option value="йіҘеҸ–зңҢ" th:selected="${area == 'йіҘеҸ–зңҢ'}">йіҘеҸ–зңҢ</option>
												<option value="еі¶ж №зңҢ" th:selected="${area == 'еі¶ж №зңҢ'}">еі¶ж №зңҢ</option>
												<option value="еІЎеұұзңҢ" th:selected="${area == 'еІЎеұұзңҢ'}">еІЎеұұзңҢ</option>
												<option value="еәғеі¶зңҢ" th:selected="${area == 'еәғеі¶зңҢ'}">еәғеі¶зңҢ</option>
												<option value="еұұеҸЈзңҢ" th:selected="${area == 'еұұеҸЈзңҢ'}">еұұеҸЈзңҢ</option>
											</optgroup>

											<optgroup label="еӣӣеӣҪ">
												<option value="еҫіеі¶зңҢ" th:selected="${area == 'еҫіеі¶зңҢ'}">еҫіеі¶зңҢ</option>
												<option value="йҰҷе·қзңҢ" th:selected="${area == 'йҰҷе·қзңҢ'}">йҰҷе·қзңҢ</option>
												<option value="ж„ӣеӘӣзңҢ" th:selected="${area == 'ж„ӣеӘӣзңҢ'}">ж„ӣеӘӣзңҢ</option>
												<option value="й«ҳзҹҘзңҢ" th:selected="${area == 'й«ҳзҹҘзңҢ'}">й«ҳзҹҘзңҢ</option>
											</optgroup>

											<optgroup label="д№қе·һ">
												<option value="зҰҸеІЎзңҢ" th:selected="${area == 'зҰҸеІЎзңҢ'}">зҰҸеІЎзңҢ</option>
												<option value="дҪҗиіҖзңҢ" th:selected="${area == 'дҪҗиіҖзңҢ'}">дҪҗиіҖзңҢ</option>
												<option value="й•·еҙҺзңҢ" th:selected="${area == 'й•·еҙҺзңҢ'}">й•·еҙҺзңҢ</option>
												<option value="зҶҠжң¬зңҢ" th:selected="${area == 'зҶҠжң¬зңҢ'}">зҶҠжң¬зңҢ</option>
												<option value="еӨ§еҲҶзңҢ" th:selected="${area == 'еӨ§еҲҶзңҢ'}">еӨ§еҲҶзңҢ</option>
												<option value="е®®еҙҺзңҢ" th:selected="${area == 'е®®еҙҺзңҢ'}">е®®еҙҺзңҢ</option>
												<option value="й№ҝе…җеі¶зңҢ" th:selected="${area == 'й№ҝе…җеі¶зңҢ'}">й№ҝе…җеі¶зңҢ</option>
											</optgroup>

											<optgroup label="жІ–зё„">
												<option value="жІ–зё„зңҢ" th:selected="${area == 'жІ–зё„зңҢ'}">жІ–зё„зңҢ</option>
											</optgroup>
										</select>
									</div>

									<div class="form-group">
										<button type="submit"
											class="btn text-white shadow-sm w-100 moattravel-btn">жӨңзҙў</button>
									</div>
								</form>
							</div>
						</div>

						<div class="card mb-3">
							<div class="card-header">
								1жіҠгҒӮгҒҹгӮҠгҒ®дәҲз®—гҒӢгӮүжҺўгҒҷ
							</div>
							<div class="card-body">
								<form method="get" th:action="@{/houses}" class="w-100">
									<div class="form-group mb-3">
										<select class="form-control form-select" name="price">
											<option value="" hidden>йҒёжҠһгҒ—гҒҰгҒҸгҒ гҒ•гҒ„</option>
											<option value="6000" th:selected="${price == 6000}">6,000еҶҶд»ҘеҶ…</option>
											<option value="7000" th:selected="${price == 7000}">7,000еҶҶд»ҘеҶ…</option>
											<option value="8000" th:selected="${price == 8000}">8,000еҶҶд»ҘеҶ…</option>
											<option value="9000" th:selected="${price == 9000}">9,000еҶҶд»ҘеҶ…</option>
											<option value="10000" th:selected="${price == 10000}">10,000еҶҶд»ҘеҶ…</option>
										</select>
									</div>

									<div class="form-group">
										<button type="submit"
											class="btn text-white shadow-sm w-100 moattravel-btn">жӨңзҙў</button>
									</div>
								</form>
							</div>
						</div>
					</div>

					<div class="col">
						<div class="d-flex justify-content-between flex-wrap">
							<p th:if="${housePage.getTotalPages() > 1}" class="fs-5 mb-3"
								th:text="${'жӨңзҙўзөҗжһңпјҡ' + housePage.getTotalElements() + 'д»¶' + 'пјҲ' + (housePage.getNumber() + 1) + ' / ' + housePage.getTotalPages() + ' гғҡгғјгӮёпјү'}">
							</p>

							<p th:unless="${housePage.getTotalPages() > 1}" class="fs-5 mb-3"
								th:text="${'жӨңзҙўзөҗжһңпјҡ' + housePage.getTotalElements() + 'д»¶'}">
							</p>

							<form method="get" th:action="@{/houses}" class="mb-3 moattravel-sort-box">
								<input th:if="${keyword}" type="hidden" name="keyword" th:value="${keyword}">
								<input th:if="${area}" type="hidden" name="area" th:value="${area}">
								<input th:if="${price}" type="hidden" name="price" th:value="${price}">

								<select class="form-select form-select-sm" name="order" onchange="this.form.submit();">
									<option value="createdAtDesc"
										th:selected="${order == 'createdAtDesc' || order == null}">ж–°зқҖй Ҷ</option>
									<option value="priceAsc" th:selected="${order == 'priceAsc'}">е®ҝжіҠж–ҷйҮ‘гҒҢе®үгҒ„й Ҷ</option>
								</select>
							</form>
						</div>
						<div class="mb-2">
							<span class="moattravel-stars" th:each="i : ${#numbers.sequence(1, 5)}"
								th:text="${i <= averageScoreMap[house.id] ? 'вҳ…' : 'вҳҶ'}">
							</span>

							<span th:if="${reviewCountMap[house.id] > 0}">
								<span th:text="${#numbers.formatDecimal(
						            averageScoreMap[house.id],
						            1,
						            1
						        )}">
								</span>

								<span th:text="${'пјҲ'
						            + reviewCountMap[house.id]
						            + 'д»¶пјү'}">
								</span>
							</span>

							<span th:if="${reviewCountMap[house.id] == 0}">
								и©•дҫЎгҒӘгҒ—
							</span>
						</div>
						<div class="mb-3" th:each="house : ${housePage}">
							<a th:href="@{/houses/__${house.getId()}__}" class="link-dark moattravel-card-link">
								<div class="card h-100">
									<div class="row g-0">
										<div class="col-md-4">
											<img th:if="${house.getImageName()}"
												th:src="@{/storage/__${house.getImageName()}__}"
												class="card-img-top moattravel-horizontal-card-image" alt="еә—иҲ—з”»еғҸ">

											<img th:unless="${house.getImageName()}" th:src="@{/images/noImage.png}"
												class="card-img-top moattravel-horizontal-card-image" alt="NO IMAGE">
										</div>

										<div class="col-md-8">
											<div class="card-body">
												<h3 class="card-title mb-3" th:text="${house.getName()}"></h3>

												<hr class="mb-3">

												<p class="card-text mb-2">
													<span th:text="${house.getDescription()}"></span>
												</p>

												<p class="card-text mb-2">
													<small class="text-muted"
														th:text="${'гҖ’' + house.getPostalCode()}"></small>
													<small class="text-muted" th:text="${house.getAddress()}"></small>
												</p>

												<p class="card-text">
													<span
														th:text="${#numbers.formatInteger(house.getPrice(), 1, 'COMMA') + 'еҶҶ / жіҠ'}"></span>
												</p>
											</div>
										</div>
									</div>
								</div>
							</a>
						</div>

						<div th:if="${housePage.getTotalPages() > 1}" class="d-flex justify-content-center">
							<nav aria-label="ж°‘е®ҝдёҖиҰ§гғҡгғјгӮё">
								<ul class="pagination">
									<li class="page-item">
										<span th:if="${housePage.isFirst()}" class="page-link disabled">еүҚ</span>

										<a th:unless="${housePage.isFirst()}"
											th:href="@{/houses(page = ${housePage.getNumber() - 1}, keyword = ${keyword}, area = ${area}, price = ${price}, order = ${order})}"
											class="page-link moattravel-page-link">
											еүҚ
										</a>
									</li>

									<li th:each="i : ${#numbers.sequence(0, housePage.getTotalPages() - 1)}"
										class="page-item">
										<span th:if="${i == housePage.getNumber()}"
											class="page-link active moattravel-active" th:text="${i + 1}">
										</span>

										<a th:unless="${i == housePage.getNumber()}"
											th:href="@{/houses(page = ${i}, keyword = ${keyword}, area = ${area}, price = ${price}, order = ${order})}"
											class="page-link moattravel-page-link" th:text="${i + 1}">
										</a>
									</li>

									<li class="page-item">
										<span th:if="${housePage.isLast()}" class="page-link disabled">ж¬Ў</span>

										<a th:unless="${housePage.isLast()}"
											th:href="@{/houses(page = ${housePage.getNumber() + 1}, keyword = ${keyword}, area = ${area}, price = ${price}, order = ${order})}"
											class="page-link moattravel-page-link">
											ж¬Ў
										</a>
									</li>
								</ul>
							</nav>
						</div>
					</div>
				</div>
			</div>
